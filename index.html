<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BIFF 2025 행사장 지도</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
  :root{
    --bg:#F7F8FA;
    --surface:rgba(255,255,255,0.92);
    --surface-solid:#FFFFFF;
    --border:#E5E7EB;
    --text:#1A1D23;
    --text-muted:#6B7280;
    --nampo:#6D4FC4;
    --nampo-soft:#EFE9FB;
    --centum:#0E9488;
    --centum-soft:#E2F6F3;
    --shadow: 0 8px 28px rgba(20,20,30,0.10), 0 1px 3px rgba(20,20,30,0.06);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    color:var(--text);
    background:var(--bg);
    overflow:hidden;
  }

  #map{
    position:absolute; inset:0;
    width:100%; height:100%;
    background:var(--bg);
  }

  .leaflet-tile-pane{ filter: saturate(0.9) brightness(1.02); }

  /* ---------- top bar ---------- */
  .topbar{
    position:absolute; top:16px; left:16px; right:16px;
    z-index:1000;
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:12px;
    pointer-events:none;
  }
  .brand{
    pointer-events:auto;
    background:var(--surface);
    backdrop-filter: blur(10px);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px 18px;
    box-shadow:var(--shadow);
    max-width:300px;
  }
  .brand .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--text-muted); margin:0 0 4px;
  }
  .brand h1{
    font-size:18px; font-weight:700; margin:0 0 2px; letter-spacing:-0.01em;
  }
  .brand p{
    font-size:12px; color:var(--text-muted); margin:0;
  }

  .controls{
    pointer-events:auto;
    display:flex; flex-direction:column; align-items:flex-end; gap:10px;
  }
  .toggle{
    display:flex; gap:4px;
    background:var(--surface);
    backdrop-filter: blur(10px);
    border:1px solid var(--border);
    border-radius:999px;
    padding:4px;
    box-shadow:var(--shadow);
  }
  .toggle button{
    appearance:none; border:none; cursor:pointer;
    font-family:'Pretendard', sans-serif;
    font-size:12.5px; font-weight:600;
    padding:8px 14px; border-radius:999px;
    background:transparent; color:var(--text-muted);
    transition:background .18s, color .18s;
    white-space:nowrap;
  }
  .toggle button.active{ color:#fff; }
  .toggle button[data-d="nampo"].active{ background:var(--nampo); }
  .toggle button[data-d="centum"].active{ background:var(--centum); }
  .toggle button[data-d="all"].active{ background:var(--text); }

  .distance-badge{
    background:var(--surface); backdrop-filter:blur(10px);
    border:1px solid var(--border); border-radius:14px;
    padding:9px 14px; box-shadow:var(--shadow);
    font-family:'JetBrains Mono', monospace;
    font-size:11px; color:var(--text-muted);
    text-align:right;
  }
  .distance-badge b{ color:var(--text); font-size:13px; }

  /* ---------- venue panel ---------- */
  .panel{
    position:absolute; left:16px; bottom:16px;
    width:328px; max-height:48vh;
    z-index:1000;
    background:var(--surface); backdrop-filter:blur(10px);
    border:1px solid var(--border); border-radius:18px;
    box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .panel-head{
    padding:14px 16px 10px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-head span{ font-size:12.5px; font-weight:700; }
  .panel-head .count{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--text-muted);
  }
  .panel-list{ overflow-y:auto; padding:6px; }
  .panel-list::-webkit-scrollbar{ width:6px; }
  .panel-list::-webkit-scrollbar-thumb{ background:#D8DAE0; border-radius:4px; }

  .venue-row{
    display:flex; gap:10px; align-items:flex-start;
    padding:9px 10px; border-radius:12px; cursor:pointer;
    transition:background .15s;
  }
  .venue-row:hover{ background:rgba(0,0,0,0.045); }
  .venue-num{
    flex:none; width:22px; height:22px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:#fff; margin-top:1px;
  }
  .venue-row[data-district="nampo"] .venue-num{ background:var(--nampo); }
  .venue-row[data-district="centum"] .venue-num{ background:var(--centum); }
  .venue-name-kr{ font-size:13px; font-weight:600; line-height:1.35; }
  .venue-name-en{ font-size:11px; color:var(--text-muted); margin-top:1px; }

  /* ---------- leaflet marker ---------- */
  .venue-marker{
    width:30px; height:30px; border-radius:50%;
    border:2.5px solid #fff;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; font-size:12.5px;
    font-family:'Pretendard', sans-serif;
    box-shadow:0 3px 8px rgba(0,0,0,0.28);
  }
  .venue-marker--nampo{ background:var(--nampo); }
  .venue-marker--centum{ background:var(--centum); }
  .venue-marker.dim{ opacity:0.28; }

  .leaflet-popup-content-wrapper{ border-radius:14px; box-shadow:var(--shadow); }
  .popup{ font-family:'Pretendard', sans-serif; min-width:180px; }
  .popup .district-tag{
    display:inline-block; font-family:'JetBrains Mono', monospace;
    font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
    padding:2px 7px; border-radius:6px; margin-bottom:6px;
  }
  .popup .district-tag.nampo{ background:var(--nampo-soft); color:var(--nampo); }
  .popup .district-tag.centum{ background:var(--centum-soft); color:var(--centum); }
  .popup .name-kr{ font-size:14px; font-weight:700; margin:0 0 1px; }
  .popup .name-en{ font-size:11.5px; color:var(--text-muted); margin:0 0 6px; }
  .popup .addr{ font-size:11.5px; color:var(--text); line-height:1.4; }

  @media (max-width:560px){
    .brand{ max-width:200px; padding:10px 14px; }
    .brand h1{ font-size:15px; }
    .panel{ width:calc(100% - 32px); max-height:38vh; }
    .toggle button{ padding:7px 10px; font-size:11.5px; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="brand">
    <p class="eyebrow">BIFF 2025 · VENUE MAP</p>
    <h1>부산국제영화제 행사장 지도</h1>
    <p>남포동 · 센텀시티 두 거점의 11개 행사장</p>
  </div>
  <div class="controls">
    <div class="toggle">
      <button data-d="all" class="active">전체</button>
      <button data-d="nampo">남포동</button>
      <button data-d="centum">센텀시티</button>
    </div>
    <div class="distance-badge">두 거점 간 거리 &nbsp;<b id="distVal">–</b></div>
  </div>
</div>

<div class="panel">
  <div class="panel-head">
    <span id="panelTitle">전체 행사장</span>
    <span class="count" id="panelCount">11곳</span>
  </div>
  <div class="panel-list" id="panelList"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
  const DISTRICTS = {
    nampo:  { label: '남포동 Nampo-dong',   color: '#6D4FC4' },
    centum: { label: '센텀시티 Centum City', color: '#0E9488' }
  };

  const VENUES = [
    { id:1, district:'nampo', num:1, kr:'메가박스 부산극장', en:'MEGABOX Busan Theater', lat:35.098616, lng:129.028757, addr:'부산 중구 광복로 36' },
    { id:2, district:'nampo', num:2, kr:'남포동 비프광장 야외무대', en:'BIFF Square Outdoor Stage', lat:35.097281, lng:129.029129, addr:'부산 중구 구덕로 44' },
    { id:3, district:'nampo', num:3, kr:'부산가톨릭센터 공간101.1', en:'Catholic Center Space 101.1', lat:35.104222, lng:129.028989, addr:'부산 중구 중구로 7' },
    { id:4, district:'nampo', num:4, kr:'BNK부산은행 아트시네마', en:'BNK Busan Bank Art Cinema', lat:35.100490, lng:129.030799, addr:'부산 중구 광복중앙로 13' },

    { id:5, district:'centum', num:1, kr:'영화의전당', en:'Busan Cinema Center', lat:35.171167, lng:129.127192, addr:'부산 해운대구 수영강변대로 120 · BIFF힐 · 더블콘 · 야외극장' },
    { id:6, district:'centum', num:2, kr:'CGV 센텀시티', en:'CGV Centum City', lat:35.168703, lng:129.129747, addr:'부산 해운대구 센텀남대로 35' },
    { id:7, district:'centum', num:3, kr:'롯데시네마 센텀시티', en:'Lotte Cinema Centum City', lat:35.169839, lng:129.131095, addr:'부산 해운대구 센텀남대로 59' },
    { id:8, district:'centum', num:4, kr:'부산시청자미디어센터', en:'Busan Community Media Center', lat:35.172564, lng:129.130270, addr:'부산 해운대구 센텀중앙로 42' },
    { id:9, district:'centum', num:5, kr:'영화진흥위원회', en:'Korean Film Council (KOFIC)', lat:35.171880, lng:129.125925, addr:'부산 해운대구 수영강변대로 130' },
    { id:10, district:'centum', num:6, kr:'영상산업센터', en:'Busan Film & Audiovisual Industry Center', lat:35.172208, lng:129.126677, addr:'부산 해운대구 센텀서로 39' },
    { id:11, district:'centum', num:7, kr:'동서대 소향씨어터 신한카드홀', en:'Dongseo Univ. Sohyang Theatre', lat:35.172832, lng:129.127731, addr:'부산 해운대구 센텀중앙로 55' },
  ];

  // ---------- map setup ----------
  const map = L.map('map', { zoomControl:false, attributionControl:true }).setView([35.135, 129.078], 12);
  L.control.zoom({ position:'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19,
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  const markers = {};
  VENUES.forEach(v => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="venue-marker venue-marker--${v.district}">${v.num}</div>`,
      iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-14]
    });
    const m = L.marker([v.lat, v.lng], { icon }).addTo(map);
    m.bindPopup(`
      <div class="popup">
        <span class="district-tag ${v.district}">${DISTRICTS[v.district].label.split(' ')[0]} · ${v.num}</span>
        <p class="name-kr">${v.kr}</p>
        <p class="name-en">${v.en}</p>
        <p class="addr">${v.addr}</p>
      </div>
    `);
    markers[v.id] = m;
  });

  // ---------- distance badge ----------
  function centroid(list){
    const lat = list.reduce((s,v)=>s+v.lat,0)/list.length;
    const lng = list.reduce((s,v)=>s+v.lng,0)/list.length;
    return [lat,lng];
  }
  function haversine([lat1,lng1],[lat2,lng2]){
    const R=6371, toRad=d=>d*Math.PI/180;
    const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
    const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(a));
  }
  const nampoC = centroid(VENUES.filter(v=>v.district==='nampo'));
  const centumC = centroid(VENUES.filter(v=>v.district==='centum'));
  document.getElementById('distVal').textContent = haversine(nampoC, centumC).toFixed(1)+' km';

  // ---------- bounds per district ----------
  function boundsFor(district){
    const list = district==='all' ? VENUES : VENUES.filter(v=>v.district===district);
    return L.latLngBounds(list.map(v=>[v.lat,v.lng]));
  }

  // ---------- panel ----------
  const panelList = document.getElementById('panelList');
  const panelTitle = document.getElementById('panelTitle');
  const panelCount = document.getElementById('panelCount');

  function renderPanel(district){
    const list = district==='all' ? VENUES : VENUES.filter(v=>v.district===district);
    panelTitle.textContent = district==='all' ? '전체 행사장' : DISTRICTS[district].label.split(' ')[0]+' 행사장';
    panelCount.textContent = list.length+'곳';
    panelList.innerHTML = list.map(v=>`
      <div class="venue-row" data-district="${v.district}" data-id="${v.id}">
        <div class="venue-num">${v.num}</div>
        <div>
          <div class="venue-name-kr">${v.kr}</div>
          <div class="venue-name-en">${v.en}</div>
        </div>
      </div>
    `).join('');
    panelList.querySelectorAll('.venue-row').forEach(row=>{
      row.addEventListener('click', ()=>{
        const v = VENUES.find(x=>x.id==row.dataset.id);
        map.flyTo([v.lat,v.lng], 17, { duration:0.6 });
        markers[v.id].openPopup();
      });
    });
  }

  // ---------- toggle ----------
  const toggleBtns = document.querySelectorAll('.toggle button');
  function setDistrict(district){
    toggleBtns.forEach(b=>b.classList.toggle('active', b.dataset.d===district));
    VENUES.forEach(v=>{
      const el = markers[v.id].getElement();
      if(!el) return;
      const inner = el.querySelector('.venue-marker');
      if(!inner) return;
      inner.classList.toggle('dim', district!=='all' && v.district!==district);
    });
    renderPanel(district);
    map.flyToBounds(boundsFor(district), { padding:[80,80], duration:0.7, maxZoom:16 });
  }
  toggleBtns.forEach(b=> b.addEventListener('click', ()=> setDistrict(b.dataset.d)));

  // ---------- init ----------
  setDistrict('all');
</script>

</body>
</html>
