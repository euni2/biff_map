<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BIFF 2025 행사장 지도</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
  :root{
    --bg:#F7F8FA;
    --surface:rgba(255,255,255,0.92);
    --surface-solid:#FFFFFF;
    --border:#E5E7EB;
    --text:#1A1D23;
    --text-muted:#6B7280;
    --nampo:#6D4FC4;
    --nampo-soft:#EFE9FB;
    --centum:#0E9488;
    --centum-soft:#E2F6F3;
    --ticket:#D97B1F;
    --ticket-soft:#FBEEDB;
    --cafe:#DC2626;
    --cafe-soft:#FCE4E4;
    --hub:#C9952E;
    --hub-soft:#FBF1DC;
    --opentalk:#4F46E5;
    --goods:#DB2777;
    --photo:#0891B2;
    --shadow: 0 8px 28px rgba(20,20,30,0.10), 0 1px 3px rgba(20,20,30,0.06);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    color:var(--text);
    background:var(--bg);
    overflow:hidden;
  }

  #map{
    position:absolute; inset:0;
    width:100%; height:100%;
    background:var(--bg);
  }

  .leaflet-tile-pane{ filter: saturate(0.9) brightness(1.02); }

  /* ---------- top bar ---------- */
  .topbar{
    position:absolute; top:16px; left:16px; right:16px;
    z-index:1000;
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:12px;
    pointer-events:none;
  }
  .brand{
    pointer-events:auto;
    background:var(--surface);
    backdrop-filter: blur(10px);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px 18px;
    box-shadow:var(--shadow);
    max-width:300px;
  }
  .brand .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--text-muted); margin:0 0 4px;
  }
  .brand h1{
    font-size:18px; font-weight:700; margin:0 0 2px; letter-spacing:-0.01em;
  }
  .brand p{
    font-size:12px; color:var(--text-muted); margin:0;
  }

  .controls{
    pointer-events:auto;
    display:flex; flex-direction:column; align-items:flex-end; gap:10px;
  }
  .toggle{
    display:flex; gap:4px;
    background:var(--surface);
    backdrop-filter: blur(10px);
    border:1px solid var(--border);
    border-radius:999px;
    padding:4px;
    box-shadow:var(--shadow);
  }
  .toggle button{
    appearance:none; border:none; cursor:pointer;
    font-family:'Pretendard', sans-serif;
    font-size:12.5px; font-weight:600;
    padding:8px 14px; border-radius:999px;
    background:transparent; color:var(--text-muted);
    transition:background .18s, color .18s;
    white-space:nowrap;
  }
  .toggle button.active{ color:#fff; }
  .toggle button[data-d="nampo"].active{ background:var(--nampo); }
  .toggle button[data-d="centum"].active{ background:var(--centum); }
  .toggle button[data-d="all"].active{ background:var(--text); }

  .distance-badge{
    background:var(--surface); backdrop-filter:blur(10px);
    border:1px solid var(--border); border-radius:14px;
    padding:9px 14px; box-shadow:var(--shadow);
    font-family:'JetBrains Mono', monospace;
    font-size:11px; color:var(--text-muted);
    text-align:right;
  }
  .distance-badge b{ color:var(--text); font-size:13px; }

  .ticket-toggle{
    pointer-events:auto;
    display:flex; align-items:center; gap:6px;
    cursor:pointer;
    background:var(--surface); backdrop-filter:blur(10px);
    border:1px solid var(--border); border-radius:999px;
    padding:8px 14px; box-shadow:var(--shadow);
    font-size:12.5px; font-weight:600; color:var(--text-muted);
    transition:background .18s, color .18s, border-color .18s;
    white-space:nowrap;
  }
  .ticket-toggle .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--ticket); flex:none;
  }
  .ticket-toggle.active{
    background:var(--ticket); color:#fff; border-color:var(--ticket);
  }
  .ticket-toggle.active .dot{ background:#fff; }
  .ticket-hint{
    font-size:10.5px; color:var(--text-muted); margin:0;
    text-align:right; max-width:200px;
  }

  /* ---------- venue / app panel ---------- */
  .panel{
    position:absolute; left:16px; bottom:16px;
    width:328px; max-height:54vh;
    z-index:1000;
    background:var(--surface); backdrop-filter:blur(10px);
    border:1px solid var(--border); border-radius:18px;
    box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    overflow:hidden;
    transition:max-height .2s;
  }
  .panel.detail-mode{ max-height:78vh; }

  .panel-head{
    padding:14px 16px 10px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:8px;
  }
  .panel-head span{ font-size:12.5px; font-weight:700; }
  .panel-head .count{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--text-muted);
    margin-left:auto;
  }

  .panel-list{ overflow-y:auto; padding:6px; }
  .panel-list.detail-mode{ padding:0; }
  .panel-list::-webkit-scrollbar{ width:6px; }
  .panel-list::-webkit-scrollbar-thumb{ background:#D8DAE0; border-radius:4px; }

  .venue-row{
    display:flex; gap:10px; align-items:flex-start;
    padding:9px 10px; border-radius:12px; cursor:pointer;
    transition:background .15s;
  }
  .venue-row:hover{ background:rgba(0,0,0,0.045); }
  .venue-num{
    flex:none; width:22px; height:22px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:#fff; margin-top:1px;
  }
  .venue-row[data-district="nampo"] .venue-num{ background:var(--nampo); }
  .venue-row[data-district="centum"] .venue-num{ background:var(--centum); }
  .venue-name-kr{ font-size:13px; font-weight:600; line-height:1.35; display:flex; align-items:center; gap:5px; }
  .venue-name-en{ font-size:11px; color:var(--text-muted); margin-top:1px; }
  .row-ticket-dot{
    width:6px; height:6px; border-radius:50%; background:var(--ticket); flex:none;
  }

  /* ---------- leaflet markers ---------- */
  .venue-marker-wrap{ position:relative; width:30px; height:30px; }
  .venue-marker-wrap.dim{ opacity:0.28; }
  .venue-marker{
    width:30px; height:30px; border-radius:50%;
    border:2.5px solid #fff;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; font-size:12.5px;
    font-family:'Pretendard', sans-serif;
    box-shadow:0 3px 8px rgba(0,0,0,0.28);
    transition:box-shadow .15s;
  }
  .venue-marker--nampo{ background:var(--nampo); }
  .venue-marker--centum{ background:var(--centum); }
  .venue-marker.selected-ring{ box-shadow:0 0 0 4px rgba(20,20,30,0.20), 0 3px 8px rgba(0,0,0,0.3); }
  .ticket-pin-badge{
    position:absolute; top:-5px; right:-5px;
    width:15px; height:15px; border-radius:50%;
    background:var(--ticket); border:2px solid #fff;
    display:flex; align-items:center; justify-content:center;
    font-size:8px; line-height:1;
  }

  .poi-marker{
    width:30px; height:30px; border-radius:50%;
    border:2.5px solid #fff; box-shadow:0 3px 8px rgba(0,0,0,0.28);
    display:flex; align-items:center; justify-content:center; font-size:14px;
    transition:box-shadow .15s;
  }
  .poi-marker.dim{ opacity:0.28; }
  .poi-marker.selected-ring{ box-shadow:0 0 0 4px rgba(20,20,30,0.20), 0 3px 8px rgba(0,0,0,0.3); }
  .poi-marker--opentalk{ background:var(--opentalk); }
  .poi-marker--goods{ background:var(--goods); }
  .poi-marker--photo{ background:var(--photo); }

  .cafe-dot{
    width:26px; height:26px; border-radius:50%;
    background:var(--cafe); border:3px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.3);
  }
  .leaflet-tooltip.cafe-tooltip{
    font-family:'Pretendard', sans-serif; font-size:11px;
    background:var(--text); color:#fff; border:none;
    padding:5px 9px; border-radius:8px; box-shadow:var(--shadow);
  }
  .leaflet-tooltip.cafe-tooltip::before{ border-top-color:var(--text); }

  .biff-hub{ display:flex; flex-direction:column; align-items:center; width:150px; cursor:pointer; }
  .biff-hub.dim{ opacity:0.28; }
  .biff-hub-label{
    background:var(--text); color:#fff; font-size:11px; font-weight:700;
    padding:6px 12px; border-radius:999px; white-space:nowrap;
    box-shadow:var(--shadow); margin-bottom:5px;
  }
  .biff-hub-dot{
    width:26px; height:26px; border-radius:50%;
    background:radial-gradient(circle at 32% 28%, #F5D98A, var(--hub));
    border:3px solid #fff;
    box-shadow:0 3px 10px rgba(0,0,0,0.35), 0 0 0 5px rgba(201,149,46,0.22);
    transition:box-shadow .15s;
  }
  .biff-hub-dot.selected-ring{ box-shadow:0 0 0 5px rgba(201,149,46,0.4), 0 3px 10px rgba(0,0,0,0.35); }

  .comm-hub{ display:flex; flex-direction:column; align-items:center; width:150px; cursor:pointer; }
  .comm-hub.dim{ opacity:0.28; }
  .comm-hub-label{
    background:var(--text); color:#fff; font-size:11px; font-weight:700;
    padding:6px 12px; border-radius:999px; white-space:nowrap;
    box-shadow:var(--shadow); margin-bottom:5px;
  }
  .comm-hub-dot{
    width:26px; height:26px; border-radius:50%;
    background:radial-gradient(circle at 32% 28%, #C7B3F0, var(--nampo));
    border:3px solid #fff;
    box-shadow:0 3px 10px rgba(0,0,0,0.35), 0 0 0 5px rgba(109,79,196,0.22);
    transition:box-shadow .15s;
  }
  .comm-hub-dot.selected-ring{ box-shadow:0 0 0 5px rgba(109,79,196,0.4), 0 3px 10px rgba(0,0,0,0.35); }

  /* ---------- app-style detail card (event-card layout) ---------- */
  .dc-hero{
    position:relative; padding:14px 16px 18px; text-align:center;
    color:#fff; overflow:hidden;
  }
  .dc-hero.theme-nampo{ background:linear-gradient(160deg,#2D2150 0%, var(--nampo) 55%, #4B36A0 100%); }
  .dc-hero.theme-centum{ background:linear-gradient(160deg,#0B3B38 0%, var(--centum) 55%, #0E6E63 100%); }
  .dc-hero.theme-hub{ background:linear-gradient(160deg,#4A3A12 0%, var(--hub) 55%, #B07F1E 100%); }
  .dc-hero.theme-opentalk{ background:linear-gradient(160deg,#201A5E 0%, var(--opentalk) 55%, #6366F1 100%); }
  .dc-hero.theme-goods{ background:linear-gradient(160deg,#570F31 0%, var(--goods) 55%, #EC4899 100%); }
  .dc-hero.theme-photo{ background:linear-gradient(160deg,#063943 0%, var(--photo) 55%, #22B8CF 100%); }

  .dc-handle{ width:36px; height:4px; border-radius:3px; background:rgba(255,255,255,0.4); margin:0 auto 10px; }
  .dc-close{
    position:absolute; top:12px; right:14px;
    width:30px; height:30px; border-radius:50%;
    background:rgba(0,0,0,0.35); border:none; color:#fff; cursor:pointer;
    font-size:14px; display:flex; align-items:center; justify-content:center;
    transition:background .15s;
  }
  .dc-close:hover{ background:rgba(0,0,0,0.5); }

  .dc-poster{
    width:108px; height:140px; margin:6px auto 12px; border-radius:14px;
    background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 10px 24px rgba(0,0,0,0.35);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  }
  .dc-poster-icon{ font-size:40px; filter:drop-shadow(0 3px 6px rgba(0,0,0,0.3)); }
  .dc-poster-cat{ font-size:10px; font-weight:700; color:rgba(255,255,255,0.85); letter-spacing:0.03em; }

  .dc-status-pill{
    display:inline-block; background:#fff; color:var(--text);
    font-size:11px; font-weight:700; padding:4px 12px; border-radius:999px;
    margin-bottom:8px;
  }
  .dc-status-pill.ended{ color:#8A8F98; }
  .dc-status-pill.live{ color:#0E9488; }
  .dc-status-pill.upcoming{ color:#2563EB; }

  .dc-title{ font-size:18px; font-weight:700; margin:0 0 3px; }
  .dc-date{ font-size:12.5px; color:rgba(255,255,255,0.85); margin:0 0 6px; }
  .dc-loc-row{
    font-size:11.5px; color:rgba(255,255,255,0.75); margin:0;
    display:inline-flex; align-items:center; gap:4px;
  }

  .dc-tabs{
    display:flex; background:var(--surface-solid); border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:2;
  }
  .dc-tab{
    flex:1; background:none; border:none; cursor:pointer;
    padding:11px 4px; font-size:12px; font-weight:600; color:var(--text-muted);
    border-bottom:2px solid transparent;
  }
  .dc-tab.active{ color:#E0512B; border-bottom-color:#E0512B; font-weight:700; }

  .dc-tabpanel{ padding:14px 16px 16px; }
  .dc-tabpanel[hidden]{ display:none; }
  .dc-placeholder{ padding:36px 16px; text-align:center; color:var(--text-muted); font-size:12.5px; }
  .dc-placeholder .ph-icon{ font-size:26px; display:block; margin-bottom:8px; }

  .dc-section-h{ font-size:13px; font-weight:700; margin:0 0 10px; }
  .dc-notice-card{
    display:flex; gap:10px; background:var(--bg); border:1px solid var(--border);
    border-radius:14px; padding:12px;
  }
  .dc-notice-thumb{
    flex:none; width:40px; height:40px; border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-size:18px;
    background:var(--hub-soft);
  }
  .dc-notice-text{ font-size:12px; line-height:1.65; color:var(--text); }
  .dc-notice-text .muted{ color:var(--text-muted); font-size:10.5px; margin-top:4px; }
  .dc-extra{ margin-top:4px; }
  .dc-extra[hidden]{ display:none; }
  .dc-expand-row{ text-align:center; margin:8px 0 4px; }
  .dc-expand-btn{
    background:none; border:none; cursor:pointer; font-size:11.5px; color:var(--text-muted);
    display:inline-flex; align-items:center; gap:3px;
  }

  .detail-section{ margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }
  .detail-section-title{
    font-size:11px; font-weight:700; color:var(--text-muted); margin:0 0 8px;
    text-transform:uppercase; letter-spacing:0.03em;
  }
  .info-row{ display:flex; gap:7px; font-size:12px; color:var(--text); line-height:1.4; }
  .info-row .icon{ flex:none; color:var(--text-muted); }

  .cafe-carousel{
    display:flex; gap:8px; overflow-x:auto;
    margin:0 -16px; padding:0 16px 4px;
  }
  .cafe-carousel::-webkit-scrollbar{ height:5px; }
  .cafe-carousel::-webkit-scrollbar-thumb{ background:#D8DAE0; border-radius:4px; }
  .cafe-card{
    flex:none; width:104px; background:var(--bg); border:1px solid var(--border);
    border-radius:12px; padding:10px; cursor:pointer;
    transition:border-color .15s, transform .15s;
  }
  .cafe-card:hover{ border-color:var(--cafe); transform:translateY(-1px); }
  .cc-icon{
    width:24px; height:24px; border-radius:50%; background:var(--cafe); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:11px; margin-bottom:6px;
  }
  .cc-name{
    font-size:10.5px; font-weight:600; line-height:1.3; color:var(--text);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:27px;
  }
  .cc-meta{ font-family:'JetBrains Mono', monospace; font-size:9.5px; color:var(--text-muted); margin-top:5px; }

  .poi-card{
    flex:none; width:104px; background:var(--bg); border:1px solid var(--border);
    border-radius:12px; padding:10px; cursor:pointer;
    transition:border-color .15s, transform .15s;
  }
  .poi-card:hover{ transform:translateY(-1px); }
  .poi-card-icon{
    width:24px; height:24px; border-radius:50%; color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:11px; margin-bottom:6px;
  }
  .poi-card-name{
    font-size:10.5px; font-weight:600; line-height:1.3; color:var(--text);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:27px;
  }
  .poi-card-loc{ font-family:'JetBrains Mono', monospace; font-size:9.5px; color:var(--text-muted); margin-top:5px; }

  .hub-list{ margin-top:2px; }
  .hub-row{
    display:flex; gap:8px; align-items:flex-start;
    padding:7px 6px; border-radius:10px; cursor:pointer;
    transition:background .15s;
  }
  .hub-row:hover{ background:rgba(0,0,0,0.05); }
  .hub-num{
    flex:none; width:20px; height:20px; border-radius:50%;
    background:var(--centum); color:#fff; font-size:10.5px; font-weight:700;
    display:flex; align-items:center; justify-content:center; margin-top:1px;
  }
  .hub-name-kr{ font-size:12.5px; font-weight:600; color:var(--text); }
  .hub-name-en{ font-size:10.5px; color:var(--text-muted); margin-top:1px; }
  .hub-tb{ margin-top:3px; }
  .hub-tb div{ font-size:9.5px; color:var(--ticket); line-height:1.45; margin-bottom:1px; }
  .hub-tb div:last-child{ margin-bottom:0; }

  .a11y-line{ font-size:10px; color:var(--centum); margin-top:2px; }

  .prog-chip-row{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .prog-chip{
    font-size:10.5px; font-weight:600; color:var(--nampo);
    background:var(--nampo-soft); padding:5px 10px; border-radius:999px;
  }

  .evt-card{ background:var(--bg); border:1px solid var(--border); border-radius:14px; padding:12px 14px; }
  .evt-head{ display:flex; align-items:baseline; gap:8px; margin-bottom:10px; }
  .evt-date{ font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:700; color:var(--text); }
  .evt-label{ font-size:12px; font-weight:700; color:var(--ticket); }
  .evt-steps{ position:relative; padding-left:14px; }
  .evt-step{ position:relative; padding-bottom:14px; }
  .evt-step:last-child{ padding-bottom:0; }
  .evt-step::before{
    content:''; position:absolute; left:-14px; top:3px;
    width:8px; height:8px; border-radius:50%; background:var(--ticket);
  }
  .evt-step:not(:last-child)::after{
    content:''; position:absolute; left:-10.5px; top:11px;
    width:1px; height:calc(100% - 4px); background:var(--border);
  }
  .evt-time{ font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--text-muted); }
  .evt-step-label{ font-size:12px; font-weight:600; color:var(--text); margin-top:1px; }
  .evt-notes{ margin-top:10px; padding-top:8px; border-top:1px dashed var(--border); }
  .evt-notes div{ font-size:10px; color:var(--text-muted); line-height:1.5; margin-bottom:2px; }
  .evt-notes div:last-child{ margin-bottom:0; }

  /* ---------- sticky bottom action bar ---------- */
  .panel-actionbar{
    display:none;
    align-items:center; gap:8px;
    padding:10px 14px; border-top:1px solid var(--border);
    background:var(--surface);
    flex:none;
  }
  .dc-icon-btn{
    width:38px; height:38px; border-radius:50%; flex:none;
    background:var(--bg); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; color:var(--text); cursor:pointer; text-decoration:none;
    transition:background .15s, border-color .15s;
  }
  .dc-icon-btn:hover{ background:#EFF1F4; }
  .dc-icon-btn.saved{ background:var(--hub-soft); border-color:var(--hub); color:#9C7521; }
  .dc-cta{
    flex:1; height:38px; border:none; border-radius:999px;
    background:linear-gradient(135deg,#FF8A4C,#E0512B); color:#fff;
    font-size:12.5px; font-weight:700; cursor:pointer; text-decoration:none;
    display:flex; align-items:center; justify-content:center; gap:5px;
    transition:opacity .15s;
  }
  .dc-cta:hover{ opacity:0.92; }

  @media (max-width:560px){
    .brand{ max-width:200px; padding:10px 14px; }
    .brand h1{ font-size:15px; }
    .panel{ width:calc(100% - 32px); max-height:42vh; }
    .panel.detail-mode{ max-height:68vh; }
    .toggle button{ padding:7px 10px; font-size:11.5px; }
    .ticket-hint{ display:none; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="brand">
    <p class="eyebrow">BIFF 2025 · VENUE MAP</p>
    <h1>부산국제영화제 행사장 지도</h1>

  function festivalStatus(){
    const start = new Date('2025-09-17T00:00:00');
    const end   = new Date('2025-09-26T23:59:59');
    const now   = new Date();
    if(now < start){
      const days = Math.ceil((start-now)/86400000);
      return { text:`D-${days}`, cls:'upcoming' };
    } else if(now <= end){
      return { text:'행사중', cls:'live' };
    }
    return { text:'종료', cls:'ended' };
  }

  // ---------- distance badge ----------
  function centroid(list){
    const lat = list.reduce((s,v)=>s+v.lat,0)/list.length;

    return [lat,lng];

  function haversine([lat1,lng1],[lat2,lng2]){
    const R=6371, toRad=d=>d*Math.PI/180;
    const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
    const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(a));
  }

    panelBody.querySelectorAll('.dc-tab').forEach(tab => {
      tab.addEventListener('click', () => {

    if(expandBtn){
      expandBtn.addEventListener('click', () => {
        const extra = panelBody.querySelector('.dc-extra');
        if(!extra) return;
        const willShow = !!extra.hidden;
        extra.hidden = !willShow;
        expandBtn.textContent = willShow ? '접기 ︿' : '펼치기 ⌄';
      });
    }

    panelBody.querySelectorAll('.cafe-card').forEach(card => {

    panelBody.querySelectorAll('.hub-row').forEach(row => {

        openVenueDetail(v);
      });
    });
    panelBody.querySelectorAll('.poi-card').forEach(card => {
      card.addEventListener('click', () => {

    if(zoomBtn){
      zoomBtn.addEventListener('click', () => {
        map.flyTo([parseFloat(zoomBtn.dataset.lat), parseFloat(zoomBtn.dataset.lng)], 19, { duration:0.5 });

    const ctaBtn = panelActionBar.querySelector('[data-open-hub]');
    if(ctaBtn) ctaBtn.addEventListener('click', openHubDetail);

    const title = ticketOnly ? districtLabel+' · 매표소 운영' : districtLabel+' 행사장';
    panelHead.style.display = 'flex';
    panelHead.innerHTML = `<span>${title}</span><span class="count">${list.length}곳</span>`;
  }
  function renderListBody(){
    const list = visibleList(currentDistrict, ticketOnly);
    panelBody.classList.remove('detail-mode');
    panelBody.innerHTML = list.map(v => `
      <div class="venue-row" data-district="${v.district}" data-id="${v.id}">
        <div class="venue-num">${v.num}</div>
        <div>
          <div class="venue-name-kr">${v.kr}${TICKETBOX[v.id] ? '<span class="row-ticket-dot"></span>' : ''}</div>
          <div class="venue-name-en">${v.en}</div>
        </div>
      </div>
    `).join('');
    panelBody.querySelectorAll('.venue-row').forEach(row => {
      row.addEventListener('click', () => {
        const v = VENUES.find(x => x.id == row.dataset.id);
        openVenueDetail(v);
      });
    });
  }
  function showList(){
    mode = 'list';
    cafeLayer.clearLayers();
    setHighlight(null);
    panelOuter.classList.remove('detail-mode');
    panelBody.classList.remove('detail-mode');
    panelActionBar.style.display = 'none';
    panelActionBar.innerHTML = '';
    renderListHeader();
    renderListBody();
  }

  // ---------- toggle ----------
  const toggleBtns = document.querySelectorAll('.toggle button');
  const ticketToggleEl = document.getElementById('ticketToggle');

  function applyView(){
    VENUES.forEach(v => {
      const el = markers[v.id].getElement();
      if(!el) return;
      const wrap = el.querySelector('.venue-marker-wrap');
      if(!wrap) return;
      const matches = (currentDistrict==='all' || v.district===currentDistrict)
                       && (!ticketOnly || TICKETBOX[v.id]);
      wrap.classList.toggle('dim', !matches);
    });
    const hubEl = hubMarker.getElement();
    if(hubEl){
      const hubWrap = hubEl.querySelector('.biff-hub');
      if(hubWrap) hubWrap.classList.toggle('dim', currentDistrict==='nampo' || ticketOnly);
    }
    const commHubEl = commHubMarker.getElement();
    if(commHubEl){
      const commWrap = commHubEl.querySelector('.comm-hub');
      if(commWrap) commWrap.classList.toggle('dim', currentDistrict==='centum' || ticketOnly);
    }
    [...GOODS, ...PHOTOZONE].forEach(p => {
      const el = poiMarkers[p.id].getElement();
      if(!el) return;
      const inner = el.querySelector('.poi-marker');
      if(!inner) return;
      const districtOk = !p.district || currentDistrict==='all' || p.district===currentDistrict;
      inner.classList.toggle('dim', !districtOk || ticketOnly);
    });
    OPENTALK.forEach(p => {
      const el = poiMarkers[p.id].getElement();
      if(!el) return;
      const inner = el.querySelector('.poi-marker');
      if(!inner) return;
      inner.classList.toggle('dim', ticketOnly);
    });
    showList();
    map.flyToBounds(boundsFor(currentDistrict, ticketOnly), { padding:[80,80], duration:0.7, maxZoom:16 });
  }

  toggleBtns.forEach(b => b.addEventListener('click', () => {
    currentDistrict = b.dataset.d;
    toggleBtns.forEach(x => x.classList.toggle('active', x===b));
    applyView();
  }));

  ticketToggleEl.addEventListener('click', () => {
    ticketOnly = !ticketOnly;
    ticketToggleEl.classList.toggle('active', ticketOnly);
    applyView();
  });

  // ---------- init ----------
  applyView();
</script>

</body>
</html>
