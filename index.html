<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BIFF 2025 행사장 지도</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
  :root{
    --bg:#F7F8FA;
    --surface:rgba(255,255,255,0.92);
    --surface-solid:#FFFFFF;
    --border:#E5E7EB;
    --text:#1A1D23;
    --text-muted:#6B7280;
    --nampo:#6D4FC4;
    --nampo-soft:#EFE9FB;
    --centum:#0E9488;
    --centum-soft:#E2F6F3;
    --ticket:#D97B1F;
    --ticket-soft:#FBEEDB;
    --cafe:#DC2626;
    --cafe-soft:#FCE4E4;
    --shadow: 0 8px 28px rgba(20,20,30,0.10), 0 1px 3px rgba(20,20,30,0.06);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    color:var(--text);
    background:var(--bg);
    overflow:hidden;
  }

  #map{
    position:absolute; inset:0;
    width:100%; height:100%;
    background:var(--bg);
  }

  .leaflet-tile-pane{ filter: saturate(0.9) brightness(1.02); }

  /* ---------- top bar ---------- */
  .topbar{
    position:absolute; top:16px; left:16px; right:16px;
    z-index:1000;
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:12px;
    pointer-events:none;
  }
  .brand{
    pointer-events:auto;
    background:var(--surface);
    backdrop-filter: blur(10px);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px 18px;
    box-shadow:var(--shadow);
    max-width:300px;
  }
  .brand .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--text-muted); margin:0 0 4px;
  }
  .brand h1{
    font-size:18px; font-weight:700; margin:0 0 2px; letter-spacing:-0.01em;
  }
  .brand p{
    font-size:12px; color:var(--text-muted); margin:0;
  }

  .controls{
    pointer-events:auto;
    display:flex; flex-direction:column; align-items:flex-end; gap:10px;
  }
  .toggle{
    display:flex; gap:4px;
    background:var(--surface);
    backdrop-filter: blur(10px);
    border:1px solid var(--border);
    border-radius:999px;
    padding:4px;
    box-shadow:var(--shadow);
  }
  .toggle button{
    appearance:none; border:none; cursor:pointer;
    font-family:'Pretendard', sans-serif;
    font-size:12.5px; font-weight:600;
    padding:8px 14px; border-radius:999px;
    background:transparent; color:var(--text-muted);
    transition:background .18s, color .18s;
    white-space:nowrap;
  }
  .toggle button.active{ color:#fff; }
  .toggle button[data-d="nampo"].active{ background:var(--nampo); }
  .toggle button[data-d="centum"].active{ background:var(--centum); }
  .toggle button[data-d="all"].active{ background:var(--text); }

  .distance-badge{
    background:var(--surface); backdrop-filter:blur(10px);
    border:1px solid var(--border); border-radius:14px;
    padding:9px 14px; box-shadow:var(--shadow);
    font-family:'JetBrains Mono', monospace;
    font-size:11px; color:var(--text-muted);
    text-align:right;
  }
  .distance-badge b{ color:var(--text); font-size:13px; }

  .ticket-toggle{
    pointer-events:auto;
    display:flex; align-items:center; gap:6px;
    cursor:pointer;
    background:var(--surface); backdrop-filter:blur(10px);
    border:1px solid var(--border); border-radius:999px;
    padding:8px 14px; box-shadow:var(--shadow);
    font-size:12.5px; font-weight:600; color:var(--text-muted);
    transition:background .18s, color .18s, border-color .18s;
    white-space:nowrap;
  }
  .ticket-toggle .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--ticket); flex:none;
  }
  .ticket-toggle.active{
    background:var(--ticket); color:#fff; border-color:var(--ticket);
  }
  .ticket-toggle.active .dot{ background:#fff; }
  .ticket-hint{
    font-size:10.5px; color:var(--text-muted); margin:0;
    text-align:right; max-width:200px;
  }

  /* ---------- venue panel ---------- */
  .panel{
    position:absolute; left:16px; bottom:16px;
    width:328px; max-height:48vh;
    z-index:1000;
    background:var(--surface); backdrop-filter:blur(10px);
    border:1px solid var(--border); border-radius:18px;
    box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .panel-head{
    padding:14px 16px 10px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-head span{ font-size:12.5px; font-weight:700; }
  .panel-head .count{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--text-muted);
  }
  .panel-list{ overflow-y:auto; padding:6px; }
  .panel-list::-webkit-scrollbar{ width:6px; }
  .panel-list::-webkit-scrollbar-thumb{ background:#D8DAE0; border-radius:4px; }

  .venue-row{
    display:flex; gap:10px; align-items:flex-start;
    padding:9px 10px; border-radius:12px; cursor:pointer;
    transition:background .15s;
  }
  .venue-row:hover{ background:rgba(0,0,0,0.045); }
  .venue-num{
    flex:none; width:22px; height:22px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:#fff; margin-top:1px;
  }
  .venue-row[data-district="nampo"] .venue-num{ background:var(--nampo); }
  .venue-row[data-district="centum"] .venue-num{ background:var(--centum); }
  .venue-name-kr{ font-size:13px; font-weight:600; line-height:1.35; display:flex; align-items:center; gap:5px; }
  .venue-name-en{ font-size:11px; color:var(--text-muted); margin-top:1px; }
  .row-ticket-dot{
    width:6px; height:6px; border-radius:50%; background:var(--ticket); flex:none;
  }

  /* ---------- leaflet marker ---------- */
  .venue-marker-wrap{ position:relative; width:30px; height:30px; }
  .venue-marker-wrap.dim{ opacity:0.28; }
  .venue-marker{
    width:30px; height:30px; border-radius:50%;
    border:2.5px solid #fff;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; font-size:12.5px;
    font-family:'Pretendard', sans-serif;
    box-shadow:0 3px 8px rgba(0,0,0,0.28);
  }
  .venue-marker--nampo{ background:var(--nampo); }
  .venue-marker--centum{ background:var(--centum); }
  .ticket-pin-badge{
    position:absolute; top:-5px; right:-5px;
    width:15px; height:15px; border-radius:50%;
    background:var(--ticket); border:2px solid #fff;
    display:flex; align-items:center; justify-content:center;
    font-size:8px; line-height:1;
  }

  .cafe-dot{
    width:26px; height:26px; border-radius:50%;
    background:var(--cafe); border:3px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.3);
  }
  .leaflet-tooltip.cafe-tooltip{
    font-family:'Pretendard', sans-serif; font-size:11px;
    background:var(--text); color:#fff; border:none;
    padding:5px 9px; border-radius:8px; box-shadow:var(--shadow);
  }
  .leaflet-tooltip.cafe-tooltip::before{ border-top-color:var(--text); }

  .leaflet-popup-content-wrapper{ border-radius:14px; box-shadow:var(--shadow); }
  .popup{ font-family:'Pretendard', sans-serif; min-width:200px; max-width:250px; }
  .popup .district-tag{
    display:inline-block; font-family:'JetBrains Mono', monospace;
    font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
    padding:2px 7px; border-radius:6px; margin-bottom:6px;
  }
  .popup .district-tag.nampo{ background:var(--nampo-soft); color:var(--nampo); }
  .popup .district-tag.centum{ background:var(--centum-soft); color:var(--centum); }
  .popup .name-kr{ font-size:14px; font-weight:700; margin:0 0 1px; }
  .popup .name-en{ font-size:11.5px; color:var(--text-muted); margin:0 0 6px; }
  .popup .addr{ font-size:11.5px; color:var(--text); line-height:1.4; }
  .popup .tb-block{ margin-top:9px; padding-top:8px; border-top:1px dashed var(--border); }
  .popup .tb-title{
    font-size:10.5px; font-weight:700; color:var(--ticket); margin:0 0 5px;
    letter-spacing:0.01em;
  }
  .popup .tb-row{ margin-bottom:6px; }
  .popup .tb-row:last-child{ margin-bottom:0; }
  .popup .tb-loc{ font-size:11.5px; font-weight:600; color:var(--text); }
  .popup .tb-meta{ font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--text-muted); margin-top:1px; }
  .popup .tb-note{ font-size:10.5px; color:var(--ticket); margin-top:1px; }

  .popup .cafe-block{ margin-top:9px; padding-top:8px; border-top:1px dashed var(--border); }
  .popup .cafe-title{
    font-size:10.5px; font-weight:700; color:var(--cafe); margin:0 0 5px;
  }
  .popup .cafe-row{
    display:flex; align-items:baseline; justify-content:space-between; gap:8px;
    font-size:11.5px; margin-bottom:3px;
  }
  .popup .cafe-row:last-child{ margin-bottom:0; }
  .popup .cafe-name{ color:var(--text); flex:1 1 auto; line-height:1.3; }
  .popup .cafe-meta{
    flex:none; font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--text-muted);
  }

  @media (max-width:560px){
    .brand{ max-width:200px; padding:10px 14px; }
    .brand h1{ font-size:15px; }
    .panel{ width:calc(100% - 32px); max-height:38vh; }
    .toggle button{ padding:7px 10px; font-size:11.5px; }
    .ticket-hint{ display:none; }
  }
</style>
</head>
<body>

<div id="map"></div>

  </div>
  <div class="controls">

  </div>
</div>

    'NOHS COFFEE Remasterd':          [35.1673702,129.1321008],
    'Paul Bassett 센텀':                [35.1702219,129.1284896],
    '파스쿠찌 센텀시티점':              [35.1664176,129.1320344],
    '일리카페 부산센텀점':              [35.1766622,129.1250648],
    'Coffee Smith 센텀':               [35.1727935,129.1279005],
  };

  // ---------- map setup ----------
  const map = L.map('map', { zoomControl:false, attributionControl:true }).setView([35.135, 129.078], 12);
  L.control.zoom({ position:'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19,
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  function ticketSection(v){
    const tb = TICKETBOX[v.id];
    if(!tb) return '';
    const rows = tb.map(t => `
      <div class="tb-row">
        <div class="tb-loc">${t.loc}</div>
        <div class="tb-meta">${t.period} · ${t.hours} · ${t.pay}</div>
        ${t.note ? `<div class="tb-note">${t.note}</div>` : ''}
      </div>
    `).join('');
    return `<div class="tb-block"><p class="tb-title">🎫 현장 매표소 운영 (임시)</p>${rows}</div>`;
  }

  function cafeSection(v){
    const cafes = CAFES[v.id];
    if(!cafes) return '';
    const rows = cafes.map(([name,rating,min]) => `
      <div class="cafe-row">
        <span class="cafe-name">${name}</span>
        <span class="cafe-meta">★${rating.toFixed(1)} · 도보${min}분</span>
      </div>
    `).join('');
    return `<div class="cafe-block"><p class="cafe-title">☕ 도보 10분 이내 카페 (평점순, 예시)</p>${rows}</div>`;
  }

  // ---------- cafe dot markers (shown while a venue popup is open) ----------
  const cafeLayer = L.layerGroup().addTo(map);
  function showCafeDots(v){
    cafeLayer.clearLayers();
    const cafes = CAFES[v.id];
    if(!cafes) return;
    cafes.forEach(([name,rating,min]) => {
      const coord = CAFE_COORDS[name];
      if(!coord) return;
      L.marker(coord, {
        icon: L.divIcon({ className:'', html:'<div class="cafe-dot"></div>', iconSize:[26,26], iconAnchor:[13,13] })
      })
      .bindTooltip(`☕ ${name} · ★${rating.toFixed(1)} · 도보${min}분`, { className:'cafe-tooltip', direction:'top', offset:[0,-8] })
      .addTo(cafeLayer);
    });
  }

  const markers = {};
  VENUES.forEach(v => {
    const hasTicket = !!TICKETBOX[v.id];
    const icon = L.divIcon({
      className: '',
      html: `<div class="venue-marker-wrap">
               <div class="venue-marker venue-marker--${v.district}">${v.num}</div>
               ${hasTicket ? '<div class="ticket-pin-badge">🎫</div>' : ''}
             </div>`,
      iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-14]
    });
    const m = L.marker([v.lat, v.lng], { icon }).addTo(map);
    m.bindPopup(`
      <div class="popup">
        <span class="district-tag ${v.district}">${DISTRICTS[v.district].label.split(' ')[0]} · ${v.num}</span>
        <p class="name-kr">${v.kr}</p>
        <p class="name-en">${v.en}</p>
        <p class="addr">${v.addr}</p>
        ${ticketSection(v)}
        ${cafeSection(v)}
      </div>
    `);
    m.on('popupopen', () => showCafeDots(v));
    m.on('popupclose', () => cafeLayer.clearLayers());
    markers[v.id] = m;
  });

  // ---------- distance badge ----------
  function centroid(list){
    const lat = list.reduce((s,v)=>s+v.lat,0)/list.length;
    const lng = list.reduce((s,v)=>s+v.lng,0)/list.length;
    return [lat,lng];
  }
  function haversine([lat1,lng1],[lat2,lng2]){
    const R=6371, toRad=d=>d*Math.PI/180;
    const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
    const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(a));
  }
  const nampoC = centroid(VENUES.filter(v=>v.district==='nampo'));
  const centumC = centroid(VENUES.filter(v=>v.district==='centum'));
  document.getElementById('distVal').textContent = haversine(nampoC, centumC).toFixed(1)+' km';

  // ---------- bounds per filter ----------
  function visibleList(district, ticketOnly){
    let list = district==='all' ? VENUES : VENUES.filter(v=>v.district===district);
    if(ticketOnly) list = list.filter(v=>TICKETBOX[v.id]);
    return list;
  }
  function boundsFor(district, ticketOnly){
    const list = visibleList(district, ticketOnly);
    return L.latLngBounds((list.length?list:VENUES).map(v=>[v.lat,v.lng]));
  }

  // ---------- panel ----------
  const panelList = document.getElementById('panelList');
  const panelTitle = document.getElementById('panelTitle');
  const panelCount = document.getElementById('panelCount');

  function renderPanel(district, ticketOnly){
    const list = visibleList(district, ticketOnly);
    const districtLabel = district==='all' ? '전체' : DISTRICTS[district].label.split(' ')[0];
    panelTitle.textContent = ticketOnly ? districtLabel+' · 매표소 운영' : districtLabel+' 행사장';
    panelCount.textContent = list.length+'곳';
    panelList.innerHTML = list.map(v=>`
      <div class="venue-row" data-district="${v.district}" data-id="${v.id}">
        <div class="venue-num">${v.num}</div>
        <div>
          <div class="venue-name-kr">${v.kr}${TICKETBOX[v.id] ? '<span class="row-ticket-dot"></span>' : ''}</div>
          <div class="venue-name-en">${v.en}</div>
        </div>
      </div>
    `).join('');
    panelList.querySelectorAll('.venue-row').forEach(row=>{
      row.addEventListener('click', ()=>{
        const v = VENUES.find(x=>x.id==row.dataset.id);
        map.flyTo([v.lat,v.lng], 17, { duration:0.6 });
        markers[v.id].openPopup();
      });
    });
  }

  // ---------- toggle ----------
  const toggleBtns = document.querySelectorAll('.toggle button');
  const ticketToggleEl = document.getElementById('ticketToggle');
  let currentDistrict = 'all';
  let ticketOnly = false;

  function applyView(){
    VENUES.forEach(v=>{
      const el = markers[v.id].getElement();
      if(!el) return;
      const wrap = el.querySelector('.venue-marker-wrap');
      if(!wrap) return;
      const matches = (currentDistrict==='all' || v.district===currentDistrict)
                       && (!ticketOnly || TICKETBOX[v.id]);
      wrap.classList.toggle('dim', !matches);
    });
    renderPanel(currentDistrict, ticketOnly);
    map.flyToBounds(boundsFor(currentDistrict, ticketOnly), { padding:[80,80], duration:0.7, maxZoom:16 });
  }

  toggleBtns.forEach(b => b.addEventListener('click', () => {
    currentDistrict = b.dataset.d;
    toggleBtns.forEach(x=>x.classList.toggle('active', x===b));
    applyView();
  }));

  ticketToggleEl.addEventListener('click', () => {
    ticketOnly = !ticketOnly;
    ticketToggleEl.classList.toggle('active', ticketOnly);
    applyView();
  });

  // ---------- init ----------
  applyView();
</script>

</body>
</html>
